<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextraPath - Discover Your Dream Career</title>
    <meta name="description" content="Discover your dream career, explore interactive learning roadmaps, and access curated study resources on NextraPath." />
    
    <!-- PWA Config -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#059669" />
    
    <!-- iOS / Safari Mobile Web App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Career Guidance" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph / Social Media Link Previews -->
    <meta property="og:title" content="NextraPath - Discover Your Dream Career" />
    <meta property="og:description" content="Find the perfect career path, follow step-by-step roadmaps, and track your learning progress." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nextrapath.in/" />
    <meta property="og:image" content="https://nextrapath.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="675" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NextraPath - Discover Your Dream Career" />
    <meta name="twitter:description" content="Find the perfect career path, follow step-by-step roadmaps, and track your learning progress." />
    <meta name="twitter:image" content="https://nextrapath.in/og-image.png" />

    <!-- Catch early PWA Install prompt events -->
    <script>
      window.pwaDeferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.pwaDeferredPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
